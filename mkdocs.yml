site_name: BoostedTravel
site_url: https://docs.boostedchat.com
site_description: Agent-native flight search & booking API. 400+ airlines, straight from the terminal.
site_author: Boosted Chat

repo_url: https://github.com/Boosted-Chat/BoostedTravel

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    scheme: slate
    primary: teal
    accent: teal
  font:
    text: Lexend
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Guide: api-guide.md
  - Agent Guide: agent-guide.md
  - CLI Reference: cli-reference.md
  - Packages: packages.md

extra:
  generator: false

extra_css:
  - assets/extra.css

copyright: ""

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true

plugins:
  - search
